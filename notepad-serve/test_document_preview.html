<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档预览测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f3f4f6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }
        
        .doc-list {
            background: white;
            border-radius: 8px;
            padding: 16px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .doc-list h3 {
            margin: 0 0 12px 0;
            color: #1f2937;
        }
        
        .doc-item {
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: background 0.2s;
        }
        
        .doc-item:hover {
            background: #eff6ff;
        }
        
        .doc-item.selected {
            background: #dbeafe;
            border-left: 3px solid #3b82f6;
        }
        
        .doc-item .name {
            font-weight: 500;
            color: #1f2937;
        }
        
        .doc-item .meta {
            font-size: 12px;
            color: #6b7280;
            margin-top: 4px;
        }
        
        .preview {
            background: white;
            border-radius: 8px;
            padding: 20px;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }
        
        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .preview-header h3 {
            margin: 0;
            color: #1f2937;
        }
        
        .preview-content {
            flex: 1;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 14px;
            line-height: 1.6;
            color: #374151;
        }
        
        .empty-preview {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
        }
        
        .loading {
            color: #6b7280;
            text-align: center;
            padding: 40px;
        }
        
        .status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        .status.done {
            background: #dcfce7;
            color: #16a34a;
        }
        
        .status.processing {
            background: #fef3c7;
            color: #d97706;
        }
        
        .error {
            color: #dc2626;
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="doc-list">
            <h3>文档列表</h3>
            <div id="docList"></div>
        </div>
        
        <div class="preview">
            <div class="preview-header" id="previewHeader">
                <h3>选择文档查看内容</h3>
            </div>
            <div id="previewContent">
                <div class="empty-preview">
                    <p>点击左侧文档查看内容</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let documents = [];
        let selectedDocId = null;

        // 获取文档列表
        async function fetchDocuments() {
            try {
                const response = await fetch('http://localhost:8000/api/documents/');
                if (response.ok) {
                    documents = await response.json();
                    renderDocList();
                } else {
                    console.error('获取文档列表失败');
                }
            } catch (error) {
                console.error('网络错误:', error);
            }
        }

        // 渲染文档列表
        function renderDocList() {
            const container = document.getElementById('docList');
            
            if (documents.length === 0) {
                container.innerHTML = '<p style="color:#9ca3af;">暂无文档</p>';
                return;
            }

            container.innerHTML = documents.map(doc => `
                <div 
                    class="doc-item ${selectedDocId === doc.id ? 'selected' : ''}"
                    onclick="selectDoc(${doc.id})"
                >
                    <div class="name">${doc.name}</div>
                    <div class="meta">
                        ${doc.file_type} · ${formatSize(doc.file_size)}
                        <span class="status ${doc.embedding_status}">${getStatusText(doc.embedding_status)}</span>
                    </div>
                </div>
            `).join('');
        }

        // 选择文档
        async function selectDoc(docId) {
            selectedDocId = docId;
            renderDocList();
            
            const header = document.getElementById('previewHeader');
            const content = document.getElementById('previewContent');
            
            // 显示加载状态
            header.innerHTML = '<h3>加载中...</h3>';
            content.innerHTML = '<div class="loading">正在获取文档内容...</div>';
            
            try {
                const response = await fetch(`http://localhost:8000/api/documents/${docId}`);
                if (response.ok) {
                    const doc = await response.json();
                    renderPreview(doc);
                } else {
                    content.innerHTML = '<p class="error">获取文档失败</p>';
                }
            } catch (error) {
                content.innerHTML = `<p class="error">网络错误: ${error.message}</p>`;
            }
        }

        // 渲染预览
        function renderPreview(doc) {
            const header = document.getElementById('previewHeader');
            const content = document.getElementById('previewContent');
            
            header.innerHTML = `
                <h3>${doc.name}</h3>
                <span class="status ${doc.embedding_status}">${getStatusText(doc.embedding_status)}</span>
            `;
            
            if (doc.content && doc.content.length > 0) {
                content.innerHTML = `<div class="preview-content">${doc.content}</div>`;
            } else {
                content.innerHTML = '<div class="empty-preview"><p>文档内容为空</p></div>';
            }
        }

        // 格式化文件大小
        function formatSize(bytes) {
            if (!bytes) return '-';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // 获取状态文本
        function getStatusText(status) {
            const map = {
                'pending': '待处理',
                'processing': '处理中',
                'done': '已完成',
                'failed': '失败'
            };
            return map[status] || status;
        }

        // 页面加载时获取文档列表
        fetchDocuments();
    </script>
</body>
</html>
